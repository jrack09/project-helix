openapi: 3.1.0
info:
  title: PIP Drug Companion API
  version: v1
  description: |
    Drug companion content API for Viora. Provides per-drug companion data —
    weekly expectations, food guidance, tips, side-effect coping strategies.
    All responses include a mandatory disclaimer object that Viora must render prominently.
servers:
  - url: https://{host}/api/public
    variables:
      host:
        default: localhost:3000

security:
  - BearerAuth: []

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: Bearer token issued by PIP admin. Prefix must be `pip_`.

  schemas:
    Disclaimer:
      type: object
      required: [text, version, as_of]
      properties:
        text:
          type: string
          description: Disclaimer text. Must be rendered prominently in Viora UI.
        version:
          type: string
          example: "1.0"
        as_of:
          type: string
          format: date
          example: "2026-04-20"

    Meta:
      type: object
      required: [version, last_updated]
      properties:
        version:
          type: string
          enum: [v1]
        last_updated:
          type: string
          format: date-time

    DrugSummary:
      type: object
      properties:
        id:          { type: string, format: uuid }
        slug:        { type: string, example: semaglutide-wegovy }
        name:        { type: string, example: "Semaglutide (Wegovy)" }
        generic_name: { type: string, nullable: true }
        brand_names: { type: array, items: { type: string } }
        drug_class:  { type: string, nullable: true }
        short_description: { type: string, nullable: true }
        image_url:  { type: string, nullable: true, example: "/drugs/semaglutide-wegovy.png" }
        administration_route: { type: string, nullable: true }
        typical_dosing_schedule: { type: string, nullable: true }
        prescription_required: { type: boolean }
        mechanism_summary: { type: string, nullable: true }
        evidence_score: { type: integer, nullable: true, minimum: 0, maximum: 100 }
        updated_at:  { type: string, format: date-time }

    DrugSource:
      type: object
      properties:
        id:            { type: string, format: uuid }
        source_type:   { type: string, enum: [prescribing_information, regulator, study, editorial, other] }
        label:         { type: string }
        url:           { type: string, nullable: true }
        region:        { type: string, nullable: true }
        authority:     { type: string, nullable: true }
        citation_text: { type: string, nullable: true }
        retrieved_at:  { type: string, format: date, nullable: true }
        ordinal:       { type: integer }

    DrugWarning:
      type: object
      properties:
        id:        { type: string, format: uuid }
        severity:  { type: string, enum: [info, caution, urgent, boxed_warning] }
        title:     { type: string }
        body:      { type: string }
        source_id: { type: string, format: uuid, nullable: true }
        ordinal:   { type: integer }

    MissedDoseRule:
      type: object
      properties:
        id:               { type: string, format: uuid }
        formulation:      { type: string, nullable: true }
        max_delay_hours:  { type: integer, nullable: true }
        instruction:      { type: string }
        restart_guidance: { type: string, nullable: true }
        source_id:        { type: string, format: uuid, nullable: true }
        ordinal:          { type: integer }

    ApprovedIndication:
      type: object
      properties:
        id:              { type: string, format: uuid }
        region:          { type: string, example: AU }
        authority:       { type: string, nullable: true, example: TGA }
        approval_status: { type: string, enum: [approved, off_label, investigational, not_approved] }
        indication:      { type: string }
        population:      { type: string, nullable: true }
        source_id:       { type: string, format: uuid, nullable: true }
        ordinal:         { type: integer }

    DoseEscalationPhase:
      type: object
      properties:
        id:                      { type: string, format: uuid }
        protocol_label:          { type: string }
        phase_label:             { type: string, example: Weeks 1-4 }
        start_week:              { type: integer, minimum: 0 }
        end_week:                { type: integer, nullable: true }
        dose_amount:             { type: number, nullable: true }
        dose_unit:               { type: string, nullable: true, example: mg }
        frequency:               { type: string, nullable: true, example: once weekly }
        route:                   { type: string, nullable: true }
        phase_purpose:           { type: string, nullable: true }
        hold_or_reduce_guidance: { type: string, nullable: true }
        source_id:               { type: string, format: uuid, nullable: true }
        ordinal:                 { type: integer }

    FormulationStorage:
      type: object
      properties:
        id:                          { type: string, format: uuid }
        formulation:                 { type: string }
        storage_state:               { type: string, nullable: true }
        temperature:                 { type: string, nullable: true }
        protect_from_light:          { type: boolean }
        do_not_freeze:               { type: boolean }
        expiry_after_opening:        { type: string, nullable: true }
        expiry_after_reconstitution: { type: string, nullable: true }
        handling_notes:              { type: string, nullable: true }
        source_id:                   { type: string, format: uuid, nullable: true }
        ordinal:                     { type: integer }

    SideEffectThreshold:
      type: object
      properties:
        id:             { type: string, format: uuid }
        side_effect_id: { type: string, format: uuid, nullable: true }
        effect:         { type: string }
        threshold:      { type: string }
        action:         { type: string, enum: [self_monitor, contact_prescriber, urgent_care, emergency] }
        action_label:   { type: string }
        source_id:      { type: string, format: uuid, nullable: true }
        ordinal:        { type: integer }

    ClinicalProfile:
      type: object
      properties:
        contraindications:      { type: string, nullable: true }
        interactions:
          type: array
          items:
            type: object
            properties:
              drug:        { type: string }
              interaction: { type: string }
              severity:    { type: string }
        storage_handling:       { type: string, nullable: true }
        pharmacokinetics:
          type: object
          additionalProperties: true
        warnings:               { type: array, items: { $ref: '#/components/schemas/DrugWarning' } }
        missed_dose_rules:      { type: array, items: { $ref: '#/components/schemas/MissedDoseRule' } }
        approved_indications:   { type: array, items: { $ref: '#/components/schemas/ApprovedIndication' } }
        dose_escalation_phases: { type: array, items: { $ref: '#/components/schemas/DoseEscalationPhase' } }
        storage:                { type: array, items: { $ref: '#/components/schemas/FormulationStorage' } }
        side_effect_thresholds: { type: array, items: { $ref: '#/components/schemas/SideEffectThreshold' } }
        sources:                { type: array, items: { $ref: '#/components/schemas/DrugSource' } }

    Expectation:
      type: object
      properties:
        id:          { type: string, format: uuid }
        week_number: { type: integer, minimum: 0 }
        milestone:   { type: string }
        description: { type: string }
        is_common:   { type: boolean }

    FoodGuidance:
      type: object
      properties:
        id:       { type: string, format: uuid }
        category: { type: string, enum: [prefer, limit, avoid, hydrate] }
        item:     { type: string }
        rationale: { type: string, nullable: true }
        evidence_level: { type: string, enum: [anecdotal, editorial, study_backed] }
        ordinal:  { type: integer }

    Tip:
      type: object
      properties:
        id:       { type: string, format: uuid }
        category: { type: string, enum: [administration, timing, mindset, exercise, sleep, hydration, nutrition, other] }
        title:    { type: string }
        body_markdown: { type: string }
        ordinal:  { type: integer }

    SideEffectTip:
      type: object
      properties:
        id:               { type: string, format: uuid }
        strategy:         { type: string }
        when_to_seek_help: { type: string, nullable: true }
        ordinal:          { type: integer }

    SideEffect:
      type: object
      properties:
        id:        { type: string, format: uuid }
        effect:    { type: string }
        severity:  { type: string, nullable: true }
        frequency: { type: string, nullable: true }
        drug_side_effect_tips:
          type: array
          items: { $ref: '#/components/schemas/SideEffectTip' }

    InjectionGuideStep:
      type: object
      properties:
        id:          { type: string, format: uuid }
        step_type:   { type: string, enum: [supply, step, warning, disposal] }
        formulation: { type: string, enum: [pen, lyophilized] }
        ordinal:     { type: integer }
        title:       { type: string }
        body:        { type: string, nullable: true }

    ReconstitutionGuide:
      type: object
      properties:
        id:                      { type: string, format: uuid }
        vial_size_mg:            { type: number }
        bac_water_ml:            { type: number }
        concentration_mg_per_ml: { type: number }
        technique_notes:         { type: string, nullable: true }
        measurement_note:        { type: string, nullable: true }
        storage_lyophilized:     { type: string, nullable: true }
        storage_reconstituted:   { type: string, nullable: true }
        use_within:              { type: string, nullable: true }
        ordinal:                 { type: integer }

    DoseReference:
      type: object
      properties:
        id:             { type: string, format: uuid }
        protocol_label: { type: string }
        phase_label:    { type: string, nullable: true }
        dose_mg:        { type: number }
        units_u100:     { type: integer }
        volume_ml:      { type: number }
        ordinal:        { type: integer }

    TrackerHints:
      type: object
      properties:
        biomarkers:
          type: array
          items:
            type: string
            enum: [weight_kg, waist_cm, nausea_0_10, appetite_0_10, energy_0_10, hydration_l, blood_glucose_mmol, injection_site_reaction]
        cadence:
          type: string
          enum: [daily, weekly]
        notes:
          type: string
          nullable: true

    Error:
      type: object
      required: [error]
      properties:
        error: { type: string }

paths:
  /drugs:
    get:
      summary: List published drug companions
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 20, maximum: 50 }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      drugs:
                        type: array
                        items: { $ref: '#/components/schemas/DrugSummary' }
                      total: { type: integer }
                      page:  { type: integer }
                      limit: { type: integer }
                  disclaimer: { $ref: '#/components/schemas/Disclaimer' }
                  meta:       { $ref: '#/components/schemas/Meta' }
        '401':
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /drugs/{slug}:
    get:
      summary: Full companion profile for a drug
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      drug:         { $ref: '#/components/schemas/DrugSummary' }
                      clinical_profile: { $ref: '#/components/schemas/ClinicalProfile' }
                      expectations: { type: array, items: { $ref: '#/components/schemas/Expectation' } }
                      food_guidance: { type: array, items: { $ref: '#/components/schemas/FoodGuidance' } }
                      tips:         { type: array, items: { $ref: '#/components/schemas/Tip' } }
                      side_effects: { type: array, items: { $ref: '#/components/schemas/SideEffect' } }
                      injection_guide: { type: array, items: { $ref: '#/components/schemas/InjectionGuideStep' } }
                      reconstitution_guide: { type: array, items: { $ref: '#/components/schemas/ReconstitutionGuide' } }
                      dose_reference: { type: array, items: { $ref: '#/components/schemas/DoseReference' } }
                  disclaimer: { $ref: '#/components/schemas/Disclaimer' }
                  meta:       { $ref: '#/components/schemas/Meta' }
        '401':
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404':
          description: Drug not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /drugs/{slug}/expectations:
    get:
      summary: Expectations for a drug (optionally filtered by week)
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
        - name: week
          in: query
          schema: { type: integer }
          description: Return only this week number
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      expectations:
                        type: array
                        items: { $ref: '#/components/schemas/Expectation' }
                  disclaimer: { $ref: '#/components/schemas/Disclaimer' }
                  meta:       { $ref: '#/components/schemas/Meta' }

  /drugs/{slug}/tracker-hints:
    get:
      summary: Biomarker tracking hints for a drug
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      tracker_hints: { $ref: '#/components/schemas/TrackerHints' }
                  disclaimer: { $ref: '#/components/schemas/Disclaimer' }
                  meta:       { $ref: '#/components/schemas/Meta' }
